<head>
  <link href="http://gmpg.org/xfn/11" rel="profile" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&family=century-burma:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <!-- Enable responsiveness on mobile devices-->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1"
  />

  <title>
    {% if page.title == "Home" %} {{ site.title }} &middot; {{ site.tagline }}
    {% else %} {{ page.title }} &middot; {{ site.title }} {% endif %}
  </title>

  <style type="text/css">
    /* Burmese text sections preserve Myanmar script font */
    .myanmar-text,
    .myanmar-text * {
      font-family: "century-burma", sans-serif;
    }
  </style>

  {% seo %}
  {% if page.lang_alt %}
  <link rel="alternate" hreflang="{% if page.lang == 'de' %}en{% else %}de{% endif %}" href="{{ site.url }}{{ page.lang_alt }}" />
  <link rel="alternate" hreflang="{{ page.lang | default: 'en' }}" href="{{ site.url }}{{ page.url }}" />
  {% endif %}

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Person",
        "@id": "https://alexsnow348.github.io/#person",
        "name": "Alex Snow",
        "alternateName": "Wuthmoneh Ninhlaing",
        "url": "https://alexsnow348.github.io",
        "image": "https://www.gravatar.com/avatar/a320402fa9d8fb397013d6f56da76b97?s=400",
        "jobTitle": "AI & LLM Consultant",
        "description": "AI and LLM consultant helping German SMBs and cultural institutions apply machine learning and large language models — from strategy to production.",
        "knowsAbout": ["Artificial Intelligence", "Large Language Models", "MLOps", "RAG Systems", "Agentic AI", "Databricks", "Museum Technology", "GenAI"],
        "knowsLanguage": ["en", "de", "my"],
        "alumniOf": {
          "@type": "CollegeOrUniversity",
          "name": "Stiftung Universität Hildesheim"
        },
        "sameAs": [
          "https://www.linkedin.com/in/wuthmonehninhlaing/",
          "https://github.com/alexsnowschool"
        ],
        "worksFor": {
          "@type": "Organization",
          "name": "ControlExpert GmbH"
        }
      },
      {
        "@type": "ProfessionalService",
        "@id": "https://alexsnow348.github.io/#service",
        "name": "Alex Snow — AI & LLM Consulting",
        "url": "https://alexsnow348.github.io",
        "description": "Practical AI, LLM, and agentic systems consulting for small and medium-sized businesses and cultural institutions in Germany and the DACH region.",
        "provider": { "@id": "https://alexsnow348.github.io/#person" },
        "areaServed": {
          "@type": "GeoCircle",
          "geoMidpoint": { "@type": "GeoCoordinates", "addressCountry": "DE" },
          "description": "Germany and DACH region"
        },
        "serviceType": ["AI Consulting", "LLM Development", "MLOps", "AI Strategy", "Museum Technology"],
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "Consulting Services",
          "itemListElement": [
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "AI Strategy & Roadmapping" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "LLM Application Development" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Agentic Workflow Design" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "MLOps & Model Deployment" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Workshops & Team Training" } }
          ]
        }
      }{% if page.layout == "article" %},
      {
        "@type": "Article",
        "headline": "{{ page.title | escape }}",
        "description": "{{ page.excerpt | strip_html | strip_newlines | truncate: 160 | escape }}",
        "author": { "@id": "https://alexsnow348.github.io/#person" },
        "publisher": { "@id": "https://alexsnow348.github.io/#person" },
        "datePublished": "{{ page.date | date_to_xmlschema }}",
        "url": "{{ site.url }}{{ page.url }}"{% if page.tags %},
        "keywords": "{{ page.tags | join: ', ' }}"{% endif %}
      }{% endif %}
    ]
  }
  </script>
  <!-- CSS -->
  <link rel="stylesheet" href="{{ site.baseurl }}/public/css/main.css" />

  <!-- Icons -->
  <link rel="shortcut icon" href="{{ site.baseurl }}/public/favicon.ico" />

  <!-- RSS -->
  <link
    rel="alternate"
    type="application/rss+xml"
    title="RSS"
    href="/atom.xml"
  />
</head>

></script>
