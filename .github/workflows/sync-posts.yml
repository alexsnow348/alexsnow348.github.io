name: Sync posts from source repo

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync posts
        env:
          SUBSTACK_TOKEN: ${{ secrets.SUBSTACK_TOKEN }}
          SUBSTACK_PUBLICATION: ${{ secrets.SUBSTACK_PUBLICATION }}
        run: python3 .github/scripts/sync_posts.py

      - name: Commit and push
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new posts to commit."
          else
            git commit -m "sync: import new posts from source repo"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger GitHub Pages rebuild
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
