  { id: 9,  title: "Getting and Cleaning Data", url: "https://www.coursera.org/account/accomplishments/certificate/7ZFSJ67CAZZS", platform: "Coursera", year: 2016, category: "Data Engineering" },
  { id: 8,  title: "R Programming", url: "https://www.coursera.org/account/accomplishments/certificate/SYUJ7DFEZRR4", platform: "Coursera", year: 2016, category: "Data Engineering" },
  { id: 7,  title: "The Data Scientist's Toolbox", url: "https://www.coursera.org/account/accomplishments/certificate/A6LDM5EVHFYD", platform: "Coursera", year: 2016, category: "Data Engineering" },
  { id: 6,  title: "Ruby on Rails: An Introduction", url: "https://www.coursera.org/account/accomplishments/certificate/9DRJWCES5SML", platform: "Coursera", year: 2016, category: "Web Development" },

  // 2015
  { id: 5,  title: "A Brief History of Humankind", url: "https://www.coursera.org/account/accomplishments/certificate/QPWKJA8QTY", platform: "Coursera", year: 2015, category: "Other" },

  // 2014

  { id: 1,  title: "Learning How to Learn: Powerful mental tools to help you master tough subjects", url: "https://www.coursera.org/account/accomplishments/certificate/2LYSLYTWM7", platform: "Coursera", year: 2014, category: "Other" },
];

// Dynamic years count from 2014 (first cert) to current year
document.getElementById('stat-years').textContent = new Date().getFullYear() - 2014 + 1;

const platformBadgeClass = {
  'Coursera':   'badge-coursera',
  'Databricks': 'badge-databricks',
  'Udacity':    'badge-udacity',
  'IBM':        'badge-ibm',
  'Bloomberg':  'badge-bloomberg',
  'Other':      'badge-other',
};

const categoryBadgeClass = {
  'ML/AI':              'badge-ml',
  'Data Engineering':   'badge-data',
  'Operations':         'badge-ops',
  'Mathematics':        'badge-math',
  'Finance':            'badge-finance',
  'Web Development':    'badge-web',
  'Project Management': 'badge-pm',
  'Art & Museum':       'badge-art',
  'Other':              'badge-general',
};

let state = { year: 'All', platform: 'All', category: 'All', search: '' };

const years      = ['All', ...new Set(certifications.map(c => c.year).sort((a,b) => b-a))];
const platforms  = ['All', ...new Set(certifications.map(c => c.platform).sort())];
const categories = ['All', ...new Set(certifications.map(c => c.category).sort())];

function buildPills(containerId, items, key) {
  const el = document.getElementById(containerId);
  el.innerHTML = items.map(v =>
    `<button class="filter-pill ${state[key] == v ? 'active' : ''}" data-key="${key}" data-val="${v}">${v}</button>`
  ).join('');
}

function filtered() {
  return certifications.filter(c => {
    if (state.year !== 'All' && c.year !== state.year) return false;
    if (state.platform !== 'All' && c.platform !== state.platform) return false;
    if (state.category !== 'All' && c.category !== state.category) return false;
    if (state.search) {
      const q = state.search.toLowerCase();
      if (!c.title.toLowerCase().includes(q) &&
          !c.platform.toLowerCase().includes(q) &&
          !c.category.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function render() {
  const list = filtered();
  const listEl  = document.getElementById('cert-list');
  const emptyEl = document.getElementById('cert-empty');
  const countEl = document.getElementById('cert-count');
  const statEl  = document.getElementById('stat-total');

  statEl.textContent = list.length;
  countEl.textContent = list.length === certifications.length
    ? `All ${certifications.length} certifications`
    : `${list.length} of ${certifications.length} certifications`;

  if (list.length === 0) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  // Group by year descending
  const byYear = {};
  list.forEach(c => { (byYear[c.year] = byYear[c.year] || []).push(c); });
  const sortedYears = Object.keys(byYear).sort((a,b) => b-a);

  listEl.innerHTML = sortedYears.map(year => `
    <div class="cert-year-section">
      <p class="cert-year-heading">${year}</p>
      ${byYear[year].map(c => `
        <div class="cert-row">
          <a class="cert-title-link" href="${c.url}" target="_blank">${c.title}</a>
          <div class="cert-badges">
            <span class="badge ${platformBadgeClass[c.platform] || 'badge-other'}">${c.platform}</span>
            <span class="badge ${categoryBadgeClass[c.category] || 'badge-general'}">${c.category}</span>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function rebuildPills() {
  buildPills('year-filters',     years,      'year');
  buildPills('platform-filters', platforms,  'platform');
  buildPills('category-filters', categories, 'category');
}

document.addEventListener('click', e => {
  if (!e.target.classList.contains('filter-pill')) return;
  const key = e.target.dataset.key;
  const val = key === 'year' && e.target.dataset.val !== 'All'
    ? parseInt(e.target.dataset.val) : e.target.dataset.val;
  state[key] = val;
  rebuildPills();
  render();
});

document.getElementById('cert-search').addEventListener('input', e => {
  state.search = e.target.value.trim();
  render();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  state = { year: 'All', platform: 'All', category: 'All', search: '' };
  document.getElementById('cert-search').value = '';
  rebuildPills();
  render();
});

rebuildPills();
render();
</script>
